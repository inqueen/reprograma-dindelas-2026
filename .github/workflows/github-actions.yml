name: github-actions
run-name: ${{ github.actor }} is learning GitHub Actions
on: [push]
jobs:
  check-bats-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        # with:
          # node-version: '@lastest'
      - run: npm install bats
      - run: npx bats -v
      - name: MongoDB uri
        run: echo "${{ secrets.MONGODB_URI }}"
